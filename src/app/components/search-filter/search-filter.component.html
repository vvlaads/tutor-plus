<div class="search-filter-container">
    <div class="search-container">
        <input type="text" [(ngModel)]="searchQuery" (input)="onSearch()" placeholder="Поиск..." class="search-input">
    </div>

    <div class="filter-container">
        <button (click)="toggleDropdown()" class="filter-button">
            {{ selectedFilterText }}
            <span class="material-icons arrow">{{ isDropdownOpen ? 'arrow_drop_up' : 'arrow_drop_down' }}</span>
        </button>

        <div *ngIf="isDropdownOpen" class="dropdown-menu">
            <div *ngFor="let group of filterGroups">
                <div class="group-label">{{ group.label }}</div>

                <div *ngFor="let option of group.options"
                    (click)="onFilterSelect(group.key, option.value)"
                    class="dropdown-item"
                    [class.active]="selectedFilter[group.key] === option.value">

                    {{ option.text }}
                </div>
            </div>
        </div>
    </div>
</div>
